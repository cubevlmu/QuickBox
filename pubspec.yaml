name: quick_box
description: "A quick startup application app."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
    
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  remove_alpha_ios: true
  image_path_android: assets/branding/logo_android_full.png
  adaptive_icon_background: "#0F1F1C"
  adaptive_icon_foreground: assets/branding/logo_android_foreground.png
  min_sdk_android: 21